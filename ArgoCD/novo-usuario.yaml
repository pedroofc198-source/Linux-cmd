#add novo usuario kubectl apply -f novo-usuario.yaml
# argocd account update-password --account bruno --current-password <SENHA_DO_ADMIN> --new-password <NOVA_SENHA_BRUNO>
# argocd account update-password --account bruno --current-password adminadmin --new-password adminadmin


apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # add an additional local user with apiKey and login capabilities
  #   apiKey - allows generating API keys
  #   login - allows to login using UI
  accounts.bruno: apiKey, login
  # disables user. User is enabled by default
  accounts.bruno.enabled: "true"